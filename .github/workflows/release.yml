name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  quality:
    name: Quality gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Typecheck, test and build
        run: npm run ci

  publish:
    name: Publish ${{ matrix.target }}
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev libgtk-3-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Build with Tauri Action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'AI Canvas v__VERSION__ - 全景与图片编辑体验升级'
          releaseBody: |
            ## 版本摘要

            AI Canvas v0.6.1 聚焦全景节点、图片编辑和画布操作可靠性，并统一了顶部浮层与各类图片工具栏的交互样式。

            ## 全景与图片编辑

            - 全景节点接入小洛全景查看器，支持独立全屏查看与比例截图。
            - 图片标注迁移至 PointEdit，统一标注层能力与交互边界。
            - 统一裁剪、抠图、合成器等图片编辑器的底部工具栏、缩放控件和紧凑布局。

            ## 画布与项目体验

            - 修复删除节点后的撤销与重做，恢复节点、边和相关状态时更加可靠。
            - 新增选中节点的流动边反馈，提升复杂画布中的定位感。
            - 优化项目切换与设置浮条的位置、毛玻璃背景、圆角层级和提示布局。
            - 统一标题栏和文件操作边界，减少不同运行环境下的界面差异。

            ## 配置与稳定性

            - 修复 Agent 自定义连接待填写密钥时未显示的问题。
            - 完善图片引用监听、节点创建与提示位置等细节。

            ## 下载

            请在下方 Assets 中选择对应平台的安装包：Windows 使用 `.exe` 或 `.msi`，macOS Apple Silicon 使用 `.dmg`，Linux 使用 `.AppImage`、`.deb` 或 `.rpm`。
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
