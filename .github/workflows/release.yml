name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  quality:
    name: Quality gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Typecheck, test and build
        run: npm run ci

  publish:
    name: Publish ${{ matrix.target }}
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-15-intel
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev libgtk-3-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Build with Tauri Action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'AI Canvas v__VERSION__ - 设置交互与 Intel Mac 支持'
          releaseBody: |
            ## ✨ 版本摘要

            AI Canvas v0.6.5 聚焦设置交互体验、节点尺寸一致性与发布稳定性，并新增 Intel Mac 安装包。

            ## 🔧 设置与交互优化

            - 项目设置中的比例与分辨率改用节点选择器，补全可选项并统一交互。
            - 修复项目设置保存时的 IndexedDB 竞态条件与保存串行化问题。
            - 修复画布右键菜单定位偏差、浅色主题选中态文字对比度等界面问题。

            ## 🧩 节点与画布

            - 提取宽高比尺寸计算逻辑并统一应用到节点创建流程。
            - 修复新建节点尺寸与所选比例、分辨率不一致的问题。

            ## 🍎 macOS 发布

            - 新增 Intel Mac（x64）安装包，同时继续提供 Apple Silicon（arm64）安装包。
            - Intel Mac 版本不包含本地 ONNX Runtime，本地 ONNX 图像处理能力不可用；其他画布与 AI 模型功能不受影响。

            ## 📦 下载

            - 🪟 Windows：使用 `.exe` 或 `.msi`。
            - 🍎 macOS：Apple Silicon 使用 `aarch64.dmg`，Intel 使用 `x64.dmg`。
            - 🐧 Linux：使用 `.AppImage`、`.deb` 或 `.rpm`。
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
